<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Sandbox // Plexove Lab</title>
    <style>
        *
      {  box-sizing: border-box;
            margin: 0;
            padding: 0; }
        
        
        body 
           { background-color: #0a0a0c;
            color: #e4e4e7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
               height: 100vh;
               display: flex;
                flex-direction: column;
                  justify-content: center;
              align-items: center; }
        
        #canvas 
            {   position: absolute;
            top: 0;
                        left: 0;
            width: 100%;
                 height: 100%;
            z-index: 1;         }
        
        .ui-container 
           { position: relative;
            z-index: 10;
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: opacity  0.3s ease;    }
        
        .ui-container.hidden
{ opacity: 0.05;
        }
        .ui-container.hidden:hover {
            opacity: 1;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 20px;
        }
        .file-upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            border: none;
            outline: none;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .file-upload-btn:hover {
            filter: brightness(1.1);
        }
        .file-upload-btn:active {
            transform: scale(0.98);
        }
        input[type="file"] {
            display: none;
        }
        .status-text {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #00f2fe;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui-container" id="ui">
        <h1>Sonic Sandbox</h1>
        <p>Drop an MP3 track below to explode the frequencies into reactive kinetic particles.</p>
        
        <label class="file-upload-btn">
            Choose Audio File
            <input type="file" id="audio-input" accept="audio/*">
        </label>
        
        <div class="status-text" id="status">Ready to mix</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audioInput = document.getElementById('audio-input');
        const statusText = document.getElementById('status');
        const uiContainer = document.getElementById('ui');

        let audioCtx = null;
        let audioSource = null;
        let analyser = null;
        let dataArray = [];
        let particles = [];
        const maxParticles = 300;

        // Sync canvas boundaries
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Particle Class
        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(init = false) {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                
                // Spawn in a clean circle matrix initially, else burst from center
                const angle = Math.random() * Math.PI * 2;
                const speed = init ? Math.random() * 2 : Math.random() * 5 + 2;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.radius = Math.random() * 3 + 1;
                this.hue = 180;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.005;
            }

            update(bassForce, highForce) {
                // Apply dynamic audio forces to vector speeds
                this.x += this.vx * (1 + bassForce * 0.05);
                this.y += this.vy * (1 + bassForce * 0.05);

                // Shift hues based on top-end frequencies
                this.hue = (180 + highForce * 0.5) % 360;
                this.alpha -= this.decay;

                // Cycle boundary check or life cycle check
                if (this.alpha <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset(false);
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
                
                // Inject clean glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 65%)`;
                
                ctx.fill();
                ctx.restore();
            }
        }

        // Initialize sandbox population
        for (let i = 0; i < maxParticles; i++) {
            particles.push(new Particle());
        }

        // File processing hook
        audioInput.addEventListener('change', function() {
            const files = this.files;
            if (files.length === 0) return;

            statusText.innerText = "Analyzing track...";
            uiContainer.classList.add('hidden');

            const file = files[0];
            const audioUrl = URL.createObjectURL(file);
            const audio = new Audio();
            audio.src = audioUrl;
            audio.crossOrigin = "anonymous";

            // Initialize Audio Pipeline on click
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512; // Controls frequency resolution
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }

            if (audioSource) {
                audioSource.disconnect();
            }

            audioSource = audioCtx.createMediaElementSource(audio);
            audioSource.connect(analyser);
            analyser.connect(audioCtx.destination);

            audio.play().then(() => {
                statusText.innerText = `Playing: ${file.name.substring(0, 25)}...`;
            }).catch(err => {
                statusText.innerText = "Audio Context unlock required.";
                uiContainer.classList.remove('hidden');
            });
        });

        // Main Animation Engine Loop
        function renderLoop() {
            // Motion blur trace technique
            ctx.fillStyle = 'rgba(10, 10, 12, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let bass = 0;
            let highs = 0;

            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                
                // Parse distinct bands
                // Bass (index 0 to 10)
                for (let i = 0; i < 10; i++) {
                    bass += dataArray[i];
                }
                bass = bass / 10;

                // Highs (index 150 to 200)
                for (let i = 150; i < 200; i++) {
                    highs += dataArray[i];
                }
                highs = highs / 50;
            }

            
            if (bass > 20) {
                ctx.beginPath();
                ctx.arc(canvas.width / 2, canvas.height / 2, 20 + bass * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 242, 254, ${Math.min(0.3, bass / 255)})`;
                ctx.fill();
            }

    
            particles.forEach(particle => {
                particle.update(bass, highs);
                particle.draw();
            });

        requst animation loop(renderLoop);
        }

        renderLoop();
    </script>
</body>
</html>
